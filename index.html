<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Neo Market</title>

<style>

:root{
--bg:#f6f3ef;
--primary:#5a3e2b;
--secondary:#caa27a;
--card:#ffffff;
--text:#2c2c2c;
--accent:#8b5e3c;
}

body{
margin:0;
font-family:system-ui, sans-serif;
background:var(--bg);
color:var(--text);
}

h1,h2,h3{
font-family:Georgia,serif;
}

a{
text-decoration:none;
color:inherit;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

nav{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 20px;
background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
position:sticky;
top:0;
z-index:100;
}

.logo{
font-size:22px;
font-weight:bold;
color:var(--primary);
}

.cart-icon{
cursor:pointer;
font-weight:bold;
}

.hero{
background:linear-gradient(120deg,#e9dfd4,#f6f3ef);
padding:60px 20px;
text-align:center;
}

.hero h1{
font-size:40px;
margin-bottom:10px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
margin-top:30px;
}

.card{
background:var(--card);
border-radius:12px;
overflow:hidden;
box-shadow:0 6px 20px rgba(0,0,0,0.08);
transition:.25s;
display:flex;
flex-direction:column;
}

.card:hover{
transform:translateY(-6px);
box-shadow:0 10px 25px rgba(0,0,0,0.12);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
}

.card-content{
padding:15px;
flex:1;
display:flex;
flex-direction:column;
}

.price{
color:var(--accent);
font-weight:bold;
margin:6px 0;
}

button{
padding:10px;
border:none;
border-radius:6px;
background:var(--primary);
color:white;
cursor:pointer;
}

button.secondary{
background:#ddd;
color:#333;
}

button:hover{
opacity:.9;
}

.filters{
margin-top:20px;
}

.filters button{
margin-right:10px;
margin-bottom:10px;
}

.product-layout{
display:grid;
grid-template-columns:1fr 1fr;
gap:30px;
}

.gallery img{
width:100%;
border-radius:10px;
}

.thumb-row{
display:flex;
gap:10px;
margin-top:10px;
}

.thumb-row img{
width:70px;
cursor:pointer;
border-radius:6px;
}

.cart-item{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
background:#fff;
padding:10px;
border-radius:8px;
}

input,textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:6px;
border:1px solid #ccc;
}

@media(max-width:768px){

.product-layout{
grid-template-columns:1fr;
}

.hero h1{
font-size:28px;
}

}

</style>
</head>
<body>

<script>

/* =========================
CONFIG
========================= */

const CONFIG = {
storeName: "Neo Market",
tagline: "Quality Goods for Modern Living",
formspree: "PASTE_FORMSPREE_URL_HERE",
currency: "$"
}

/* =========================
PRODUCTS
Edit products here
========================= */

const PRODUCTS = [

{
id:1,
name:"Leather Travel Bag",
price:120,
category:"bags",
description:"Premium handmade leather travel bag designed for durability and style.",
images:[
"https://images.unsplash.com/photo-1548036328-c9fa89d128fa",
"https://images.unsplash.com/photo-1518546305927-5a555bb7020d"
],
stock:10
},

{
id:2,
name:"Minimal Wrist Watch",
price:80,
category:"watches",
description:"Elegant minimal watch with premium stainless steel body.",
images:[
"https://images.unsplash.com/photo-1516574187841-cb9cc2ca948b"
],
stock:15
},

{
id:3,
name:"Canvas Backpack",
price:60,
category:"bags",
description:"Rugged canvas backpack perfect for travel and daily use.",
images:[
"https://images.unsplash.com/photo-1506629905607-d4052e9a29db"
],
stock:20
},

{
id:4,
name:"Desk Lamp",
price:40,
category:"home",
description:"Modern desk lamp for warm ambient lighting.",
images:[
"https://images.unsplash.com/photo-1519710164239-da123dc03ef4"
],
stock:12
}

]

/* =========================
CART
========================= */

function getCart(){
return JSON.parse(localStorage.getItem("neo_cart")||"[]")
}

function saveCart(cart){
localStorage.setItem("neo_cart",JSON.stringify(cart))
updateCartCount()
}

function addToCart(id){

let cart=getCart()
let item=cart.find(i=>i.id==id)

if(item){
item.qty++
}else{
cart.push({id:id,qty:1})
}

saveCart(cart)
render()
}

function removeFromCart(id){

let cart=getCart().filter(i=>i.id!=id)
saveCart(cart)
render()

}

function changeQty(id,qty){

let cart=getCart()
let item=cart.find(i=>i.id==id)

if(item){
item.qty=qty
}

saveCart(cart)
render()

}

function updateCartCount(){

let cart=getCart()
let count=cart.reduce((a,b)=>a+b.qty,0)
document.getElementById("cartCount").innerText=count

}

/* =========================
ROUTER
========================= */

window.addEventListener("hashchange",render)

function render(){

let route=location.hash || "#home"

if(route.startsWith("#product")){
let id=parseInt(route.split("=")[1])
renderProduct(id)
}
else if(route=="#cart"){
renderCart()
}
else if(route=="#checkout"){
renderCheckout()
}
else{
renderHome()
}

updateCartCount()

}

/* =========================
HOME
========================= */

function renderHome(){

let categories=[...new Set(PRODUCTS.map(p=>p.category))]

let html=`
<div class="hero">
<h1>${CONFIG.storeName}</h1>
<p>${CONFIG.tagline}</p>
</div>

<div class="container">

<div class="filters">
<button onclick="filterProducts('all')">All</button>
${categories.map(c=>`<button onclick="filterProducts('${c}')">${c}</button>`).join("")}
</div>

<div id="productGrid" class="grid"></div>

</div>
`

app.innerHTML=html

filterProducts("all")

}

function filterProducts(cat){

let grid=document.getElementById("productGrid")

let items = PRODUCTS.filter(p=>cat=="all"||p.category==cat)

let cart=getCart()

grid.innerHTML=items.map(p=>{

let inCart=cart.find(i=>i.id==p.id)

return `
<div class="card">

<img src="${p.images[0]}" onclick="location.hash='#product=${p.id}'">

<div class="card-content">

<h3>${p.name}</h3>
<div class="price">${CONFIG.currency}${p.price}</div>

<button onclick="event.stopPropagation();addToCart(${p.id})">

${inCart?"In Cart ✓":"Add to Cart"}

</button>

</div>

</div>
`

}).join("")

}

/* =========================
PRODUCT PAGE
========================= */

function renderProduct(id){

let p=PRODUCTS.find(p=>p.id==id)

let related=PRODUCTS.filter(x=>x.category==p.category && x.id!=p.id).slice(0,3)

let html=`
<div class="container">

<div class="product-layout">

<div class="gallery">

<img id="mainImg" src="${p.images[0]}">

<div class="thumb-row">
${p.images.map(i=>`<img src="${i}" onclick="document.getElementById('mainImg').src='${i}'">`).join("")}
</div>

</div>

<div>

<h2>${p.name}</h2>
<div class="price">${CONFIG.currency}${p.price}</div>

<p>${p.description}</p>

<label>Quantity</label>
<input id="qty" type="number" value="1" min="1">

<button onclick="addToCart(${p.id})">Add to Cart</button>

</div>

</div>

<h3>Related Products</h3>

<div class="grid">
${related.map(r=>`

<div class="card" onclick="location.hash='#product=${r.id}'">
<img src="${r.images[0]}">
<div class="card-content">
<h3>${r.name}</h3>
<div class="price">${CONFIG.currency}${r.price}</div>
</div>
</div>

`).join("")}
</div>

</div>
`

app.innerHTML=html

}

/* =========================
CART PAGE
========================= */

function renderCart(){

let cart=getCart()

if(cart.length==0){

app.innerHTML=`<div class="container"><h2>Your cart is empty</h2></div>`
return

}

let total=0

let html=`
<div class="container">
<h2>Your Cart</h2>
`

cart.forEach(item=>{

let p=PRODUCTS.find(p=>p.id==item.id)
let sub=p.price*item.qty
total+=sub

html+=`
<div class="cart-item">

<div>
<strong>${p.name}</strong><br>
${CONFIG.currency}${p.price}
</div>

<div>

<input type="number" value="${item.qty}" min="1"
onchange="changeQty(${p.id},this.value)">

<button onclick="removeFromCart(${p.id})">Remove</button>

</div>

</div>
`

})

html+=`

<h3>Total: ${CONFIG.currency}${total}</h3>

<button onclick="location.hash='#checkout'">Checkout</button>

</div>
`

app.innerHTML=html

}

/* =========================
CHECKOUT
========================= */

function renderCheckout(){

let cart=getCart()

if(cart.length==0){
location.hash="#home"
return
}

let total=0

cart.forEach(i=>{
let p=PRODUCTS.find(p=>p.id==i.id)
total+=p.price*i.qty
})

app.innerHTML=`

<div class="container">

<h2>Checkout</h2>

<form id="checkoutForm">

<input name="name" placeholder="Name" required>
<input name="email" placeholder="Email" required>
<input name="phone" placeholder="Phone" required>
<textarea name="address" placeholder="Address" required></textarea>
<textarea name="notes" placeholder="Notes"></textarea>

<h3>Total: ${CONFIG.currency}${total}</h3>

<button type="submit">Place Order</button>

</form>

</div>

`

document.getElementById("checkoutForm").addEventListener("submit",async(e)=>{

e.preventDefault()

let form=new FormData(e.target)
form.append("cart",JSON.stringify(cart))

await fetch(CONFIG.formspree,{
method:"POST",
body:form
})

localStorage.removeItem("neo_cart")

app.innerHTML="<div class='container'><h2>Order placed successfully!</h2><p>Redirecting...</p></div>"

setTimeout(()=>{
location.hash="#home"
},3000)

})

}

/* =========================
INIT
========================= */

document.body.insertAdjacentHTML("afterbegin",`

<nav>
<div class="logo">${CONFIG.storeName}</div>
<div class="cart-icon" onclick="location.hash='#cart'">
Cart (<span id="cartCount">0</span>)
</div>
</nav>

<div id="app"></div>

`)

const app=document.getElementById("app")

render()

</script>

</body>
</html>
